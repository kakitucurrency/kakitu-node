
[node]
# Bind address for the node
# type:string,ip
peering_port = 44075
# Enable voting (required for genesis/representative nodes)
# type:bool
enable_voting = true
# Minimum online weight for quorum (low for single-node bootstrap)
# type:string
online_weight_minimum = "1"

[node.websocket]

# WebSocket server bind address.
# type:string,ip
address = "::ffff:0.0.0.0"
# Enable or disable WebSocket server.
# type:bool
enable = true

[rpc]

# Enable or disable RPC.
# type:bool
enable = true
